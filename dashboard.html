<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>T-Coin Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .positive { color: green; font-weight: bold; }
    .negative { color: red; font-weight: bold; }
    canvas { margin-top: 30px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Welcome to T-Coin Dashboard</h2>
    <p id="welcomeMessage">Hello, user! You are now logged in.</p>

    <!-- Wallet Balance Section -->
    <h3>Your Wallet Holdings</h3>
    <table id="walletTable" style="width:100%; border-collapse: collapse; margin-top: 15px;">
      <thead>
        <tr style="background:#f4f6f9;">
          <th style="border:1px solid #ccc; padding:8px;">Cryptocurrency</th>
          <th style="border:1px solid #ccc; padding:8px;">Symbol</th>
          <th style="border:1px solid #ccc; padding:8px;">Balance</th>
          <th style="border:1px solid #ccc; padding:8px;">USD Value</th>
          <th style="border:1px solid #ccc; padding:8px;">Change %</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td style="border:1px solid #ccc; padding:8px;">Bitcoin</td>
          <td style="border:1px solid #ccc; padding:8px;">BTC</td>
          <td style="border:1px solid #ccc; padding:8px;" id="btcBalance">0.025</td>
          <td style="border:1px solid #ccc; padding:8px;" id="btcValue">$0</td>
          <td style="border:1px solid #ccc; padding:8px;" id="btcChange">0%</td>
        </tr>
        <tr>
          <td style="border:1px solid #ccc; padding:8px;">Ethereum</td>
          <td style="border:1px solid #ccc; padding:8px;">ETH</td>
          <td style="border:1px solid #ccc; padding:8px;" id="ethBalance">0.5</td>
          <td style="border:1px solid #ccc; padding:8px;" id="ethValue">$0</td>
          <td style="border:1px solid #ccc; padding:8px;" id="ethChange">0%</td>
        </tr>
        <tr>
          <td style="border:1px solid #ccc; padding:8px;">eCash</td>
          <td style="border:1px solid #ccc; padding:8px;">XEC</td>
          <td style="border:1px solid #ccc; padding:8px;" id="xecBalance">1000000</td>
          <td style="border:1px solid #ccc; padding:8px;" id="xecValue">$0</td>
          <td style="border:1px solid #ccc; padding:8px;" id="xecChange">0%</td>
        </tr>
      </tbody>
    </table>

    <!-- Portfolio Total -->
    <h3 style="margin-top:20px;">Portfolio Total Value: <span id="portfolioTotal">$0</span></h3>

    <!-- Historical Chart -->
    <h3 style="margin-top:30px;">7-Day Price History</h3>
    <canvas id="priceChart" width="400" height="200"></canvas>

    <!-- Dashboard Actions -->
    <div class="dashboard-actions" style="margin-top:20px;">
      <button onclick="viewProfile()">View Profile</button>
      <button onclick="viewWallet()">View Wallet</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    const username = localStorage.getItem('username') || "User";
    document.getElementById('welcomeMessage').textContent = "Hello, " + username + "! You are now logged in.";

    let prevValues = { btc: 0, eth: 0, xec: 0 };

    async function fetchPrices() {
      try {
        const response = await fetch(
          "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,ecash&vs_currencies=usd"
        );
        const data = await response.json();

        const btcBalance = parseFloat(document.getElementById("btcBalance").textContent);
        const ethBalance = parseFloat(document.getElementById("ethBalance").textContent);
        const xecBalance = parseFloat(document.getElementById("xecBalance").textContent);

        const btcValue = btcBalance * data.bitcoin.usd;
        const ethValue = ethBalance * data.ethereum.usd;
        const xecValue = xecBalance * data.ecash.usd;

        updateValue("btcValue", "btcChange", btcValue, prevValues.btc);
        updateValue("ethValue", "ethChange", ethValue, prevValues.eth);
        updateValue("xecValue", "xecChange", xecValue, prevValues.xec);

        prevValues = { btc: btcValue, eth: ethValue, xec: xecValue };

        const totalValue = btcValue + ethValue + xecValue;
        document.getElementById("portfolioTotal").textContent = "$" + totalValue.toFixed(2);
      } catch (error) {
        console.error("Error fetching prices:", error);
      }
    }

    function updateValue(valueId, changeId, newValue, oldValue) {
      const valueElement = document.getElementById(valueId);
      const changeElement = document.getElementById(changeId);

      valueElement.textContent = "$" + newValue.toFixed(2);

      if (oldValue > 0) {
        const changePercent = ((newValue - oldValue) / oldValue) * 100;
        changeElement.textContent = changePercent.toFixed(2) + "%";

        if (changePercent > 0) {
          valueElement.className = "positive";
          changeElement.className = "positive";
        } else if (changePercent < 0) {
          valueElement.className = "negative";
          changeElement.className = "negative";
        } else {
          valueElement.className = "";
          changeElement.className = "";
        }
      }
    }

    // Historical Chart
    async function fetchHistoricalData() {
      try {
        const [btcRes, ethRes, xecRes] = await Promise.all([
          fetch("https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=7"),
          fetch("https://api.coingecko.com/api/v3/coins/ethereum/market_chart?vs_currency=usd&days=7"),
          fetch("https://api.coingecko.com/api/v3/coins/ecash/market_chart?vs_currency=usd&days=7")
        ]);

        const btcData = await btcRes.json();
        const ethData = await ethRes.json();
        const xecData = await xecRes.json();

        const labels = btcData.prices.map(p => new Date(p[0]).toLocaleDateString());
        const btcPrices = btcData.prices.map(p => p[1]);
        const ethPrices = ethData.prices.map(p => p[1]);
        const xecPrices = xecData.prices.map(p => p[1]);

        const ctx = document.getElementById('priceChart').getContext('2d');
        new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [
              { label: 'Bitcoin (BTC)', data: btcPrices, borderColor: 'orange', fill: false },
              { label: 'Ethereum (ETH)', data: ethPrices, borderColor: 'blue', fill: false },
              { label: 'eCash (XEC)', data: xecPrices, borderColor: 'green', fill: false }
            ]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { position: 'bottom' }
            }
          }
        });
      } catch (error) {
        console.error("Error fetching historical data:", error);
      }
    }

    fetchPrices();
    setInterval(fetchPrices, 60000);
    fetchHistoricalData();

    function viewProfile() { alert("Profile page coming soon!"); }
    function viewWallet() { alert("Wallet details are displayed above."); }
    function logout() {
      alert("You have been logged out.");
      localStorage.removeItem('username');
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
