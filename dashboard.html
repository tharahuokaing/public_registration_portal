<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>T-Coin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Welcome to T-Coin Dashboard</h2>
    <p id="welcomeMessage">Hello, user! You are now logged in.</p>

    <!-- Wallet Balance Section -->
    <h3>Your Wallet Holdings</h3>
    <table id="walletTable" style="width:100%; border-collapse: collapse; margin-top: 15px;">
      <thead>
        <tr style="background:#f4f6f9;">
          <th style="border:1px solid #ccc; padding:8px;">Cryptocurrency</th>
          <th style="border:1px solid #ccc; padding:8px;">Symbol</th>
          <th style="border:1px solid #ccc; padding:8px;">Balance</th>
          <th style="border:1px solid #ccc; padding:8px;">USD Value</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td style="border:1px solid #ccc; padding:8px;">Bitcoin</td>
          <td style="border:1px solid #ccc; padding:8px;">BTC</td>
          <td style="border:1px solid #ccc; padding:8px;" id="btcBalance">0.025</td>
          <td style="border:1px solid #ccc; padding:8px;" id="btcValue">$0</td>
        </tr>
        <tr>
          <td style="border:1px solid #ccc; padding:8px;">Ethereum</td>
          <td style="border:1px solid #ccc; padding:8px;">ETH</td>
          <td style="border:1px solid #ccc; padding:8px;" id="ethBalance">0.5</td>
          <td style="border:1px solid #ccc; padding:8px;" id="ethValue">$0</td>
        </tr>
        <tr>
          <td style="border:1px solid #ccc; padding:8px;">eCash</td>
          <td style="border:1px solid #ccc; padding:8px;">XEC</td>
          <td style="border:1px solid #ccc; padding:8px;" id="xecBalance">1000000</td>
          <td style="border:1px solid #ccc; padding:8px;" id="xecValue">$0</td>
        </tr>
      </tbody>
    </table>

    <!-- Dashboard Actions -->
    <div class="dashboard-actions" style="margin-top:20px;">
      <button onclick="viewProfile()">View Profile</button>
      <button onclick="viewWallet()">View Wallet</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <script>
    // Example: Replace with actual username from backend or login.js
    const username = localStorage.getItem('username') || "User";
    document.getElementById('welcomeMessage').textContent = "Hello, " + username + "! You are now logged in.";

    async function fetchPrices() {
      try {
        const response = await fetch(
          "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,ecash&vs_currencies=usd"
        );
        const data = await response.json();

        // Balances
        const btcBalance = parseFloat(document.getElementById("btcBalance").textContent);
        const ethBalance = parseFloat(document.getElementById("ethBalance").textContent);
        const xecBalance = parseFloat(document.getElementById("xecBalance").textContent);

        // Update USD values
        document.getElementById("btcValue").textContent = "$" + (btcBalance * data.bitcoin.usd).toFixed(2);
        document.getElementById("ethValue").textContent = "$" + (ethBalance * data.ethereum.usd).toFixed(2);
        document.getElementById("xecValue").textContent = "$" + (xecBalance * data.ecash.usd).toFixed(2);
      } catch (error) {
        console.error("Error fetching prices:", error);
      }
    }

    // Fetch prices on load and refresh every 60 seconds
    fetchPrices();
    setInterval(fetchPrices, 60000);

    function viewProfile() {
      alert("Profile page coming soon!");
    }

    function viewWallet() {
      alert("Wallet details are displayed above.");
    }

    function logout() {
      alert("You have been logged out.");
      localStorage.removeItem('username');
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
